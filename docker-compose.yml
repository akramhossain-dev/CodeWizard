version: '3.9'

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codewizard-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codewizard-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persistent uploads directory (before Cloudinary upload)
      - uploads_data:/app/uploads
      # Mount Docker socket so the server can spawn sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Isolated temp directory for code execution
      - judge_tmp:/var/codewizard/exec
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Submission Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codewizard-worker
    restart: unless-stopped
    command: node workers/submissionWorker.js
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/var/codewizard/exec

  # ── Next.js Client ─────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: codewizard-client
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - ./client/.env
    ports:
      - "3000:3000"

volumes:
  redis_data:
  uploads_data:
  judge_tmp:
