services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codewizard-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c '
        if [ -z "$REDIS_PASSWORD" ]; then
          exec redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru;
        else
          exec redis-server --requirepass "$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy allkeys-lru;
        fi
      '
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a \"$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codewizard-server
    user: "root"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOW_LOCALHOST_IN_PRODUCTION: "true"
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persistent uploads directory (before Cloudinary upload)
      - uploads_data:/app/uploads
      # Mount Docker socket so the server can spawn sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Isolated temp directory for code execution
      - judge_tmp:/var/codewizard/exec
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Submission Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codewizard-worker
    user: "root"
    restart: unless-stopped
    command: node workers/submissionWorker.js
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 5
      ALLOW_LOCALHOST_IN_PRODUCTION: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judge_tmp:/var/codewizard/exec
    healthcheck:
      disable: true

  # ── Next.js Client ─────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=1038824325313-cua4iqlo2o7kog7mb4bs2m6uqanrsqtk.apps.googleusercontent.com
        - NEXT_PUBLIC_GITHUB_CLIENT_ID=Ov23lidyiNJQ8f7tE6QA
    container_name: codewizard-client
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - ./client/.env
    ports:
      - "3000:3000"

volumes:
  redis_data:
  uploads_data:
  judge_tmp:
